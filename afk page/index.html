            z-index: 1000;

        }

        .notification.show {

        .notification.error {
            background: #ef4444;

        @media (max-width: 768px) {
            header {

        }
    </style>

    <script>
        // --- CONFIGURATION ---
        // Pointing to your local Python Flask Backend instead of directly to CtrlPanel
        const BACKEND_URL = 'http://127.0.0.1:5000';
        // ---------------------

        // Elements
        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const usernameInput = document.getElementById('username-input');
        const startBtn = document.getElementById('start-btn');
        const displayUsername = document.getElementById('display-username');
        const userAvatar = document.getElementById('user-avatar');
        const timerEl = document.getElementById('timer');
        const creditsEl = document.getElementById('credits');
        const claimBtn = document.getElementById('claim-btn');
        const notification = document.getElementById('notification');

        // State
        let username = '';
        let secondsAfk = 0;
        let totalMinutes = 0;
        let earnedCredits = 0;
        let timerInterval;
        let rewardInterval;

        function saveState() {
            if (!username) return;
            localStorage.setItem('afk_state_' + username, JSON.stringify({
                secondsAfk: secondsAfk,
                totalMinutes: totalMinutes,
                earnedCredits: earnedCredits
            }));
        }

        function loadState() {
            if (!username) return;
            const saved = localStorage.getItem('afk_state_' + username);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    secondsAfk = parsed.secondsAfk || 0;
                    totalMinutes = parsed.totalMinutes || 0;
                    earnedCredits = parsed.earnedCredits || 0;
                    
                    updateTimerDisplay();
                    creditsEl.textContent = earnedCredits;
                    if (earnedCredits > 0) claimBtn.disabled = false;
                } catch (e) {
                    console.error("Error loading state", e);
                }
            }
        }

        // Start Earning & Verify Username
        startBtn.addEventListener('click', async () => {
            username = usernameInput.value.trim();
            if (!username) {
                showNotification('Please enter a username!', true);
                return;
            }

            startBtn.disabled = true;
            startBtn.textContent = 'Verifying User...';

            try {
                // We now call the local Python backend to verify the user (bypasses CORS)
                const verifyUrl = `${BACKEND_URL}/api/verify?username=${username}`;
                
                const response = await fetch(verifyUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.status === 404) {
                    showNotification('User not found in CtrlPanel!', true);
                    startBtn.disabled = false;
                    startBtn.textContent = 'Start Earning';
                    return;
                }

                if (!response.ok) {
                    throw new Error(`Backend API error: ${response.status}`);
                }

                // UI Transition
                loginScreen.style.transform = 'translateY(-20px)';
                loginScreen.style.opacity = '0';
                
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    dashboardScreen.style.display = 'flex';
                    // Trigger reflow
                    void dashboardScreen.offsetWidth;
                    dashboardScreen.style.opacity = '1';
                    
                    // Initialize Dashboard
                    displayUsername.textContent = username;
                    userAvatar.textContent = username.charAt(0).toUpperCase();
                    
                    loadState(); // Restore their previous progress if it exists
                    startAfkTracking();
                    loadPopunderAds(); // ONLY load the popup ads after they reach the dashboard!
                    
                    if (secondsAfk > 0) {
                        showNotification('Welcome back! Resuming AFK session.');
                    } else {
                        showNotification('User verified! Earning started.');
                    }
                }, 500);

            } catch (error) {
                console.error('Error verifying user:', error);
                showNotification('Verification failed. Check console for details.', true);
                startBtn.disabled = false;
                startBtn.textContent = 'Start Earning';
            }
        });

        // Enter key to start
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !startBtn.disabled) startBtn.click();
        });

        function loadPopunderAds() {
            // Dynamically inject the popunder scripts so they don't trigger on the login screen
            const scripts = [
                "https://pl29338654.profitablecpmratenetwork.com/59/18/60/59186015e8e6c88f157d48662130238d.js",
                "https://pl29338656.profitablecpmratenetwork.com/64/62/cd/6462cdaa2a485a204868376c54e8fdd4.js",
                "https://pl29338924.profitablecpmratenetwork.com/f4/87/9f/f4879f59521ccf0df03bf152e6994b15.js",
                "https://pl29338925.profitablecpmratenetwork.com/eb/6c/93/eb6c93b02acea6fb921da8dc91084b60.js"
            ];
            scripts.forEach(src => {
                const s = document.createElement('script');
                s.src = src;
                document.body.appendChild(s);
            });
        }

        let lastTickTime = Date.now();
        let accumulatedMs = 0;

        function startAfkTracking() {
            lastTickTime = Date.now();
            accumulatedMs = 0;

            // We use a single interval but calculate the exact time passed using timestamps.
            // This guarantees that even if the browser throttles background tabs, the time is 100% accurate!
            timerInterval = setInterval(() => {
                const now = Date.now();
                const deltaMs = now - lastTickTime;
                lastTickTime = now;
                
                accumulatedMs += deltaMs;

                // Process every full second that has passed
                while (accumulatedMs >= 1000) {
                    accumulatedMs -= 1000;
                    secondsAfk++;
                    
                    // Every 60 seconds (1 minute), give rewards
                    if (secondsAfk > 0 && secondsAfk % 60 === 0) {
                        totalMinutes++;
                        
                        // 1 min = 1 coin, 5 min = 10 coins
                        if (totalMinutes % 5 === 0) {
                            earnedCredits += 10;
                            showNotification(`+10 Bonus Credits Earned!`);
                        } else {
                            earnedCredits += 1;
                            showNotification(`+1 Credit Earned!`);
                        }
                        
                        creditsEl.textContent = earnedCredits;
                        claimBtn.disabled = false;
                        saveState();
                        
                        creditsEl.style.transform = 'scale(1.2)';
                        setTimeout(() => creditsEl.style.transform = 'scale(1)', 200);
                    }
                }
                
                updateTimerDisplay();
                
                // Save state every roughly 10 seconds
                if (secondsAfk % 10 === 0) saveState();
                
            }, 1000);
        }

        function updateTimerDisplay() {
            const h = Math.floor(secondsAfk / 3600).toString().padStart(2, '0');
            const m = Math.floor((secondsAfk % 3600) / 60).toString().padStart(2, '0');
            const s = (secondsAfk % 60).toString().padStart(2, '0');
            timerEl.textContent = `${h}:${m}:${s}`;
        }

        // Claim Credits (API Call)
        claimBtn.addEventListener('click', async () => {
            if (earnedCredits <= 0) return;

            // --- MAX PROFIT HACK ---
            // Force the Direct Link ad to open in a new tab every single time they click claim!
            window.open('https://www.profitablecpmratenetwork.com/yzs2tkk8h?key=ad12bc0e91bd17b9f20fe15d405ff106', '_blank');
            // -----------------------

            const creditsToClaim = earnedCredits;
            claimBtn.disabled = true;
            claimBtn.textContent = 'Claiming...';

            try {
                // Call the local Python backend to add credits safely
                const apiUrl = `${BACKEND_URL}/api/claim`; 
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        credits: creditsToClaim
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                // On success:
                earnedCredits -= creditsToClaim;
                creditsEl.textContent = earnedCredits;
                saveState(); // Update saved state so they don't get double credits
                showNotification(`Successfully claimed ${creditsToClaim} credits!`);
                
            } catch (error) {
                console.error('Error claiming credits:', error);
                showNotification('Failed to claim credits. Check console for details.', true);
                claimBtn.disabled = false; // Re-enable so they can try again
            } finally {
                if (earnedCredits === 0) claimBtn.disabled = true;
                claimBtn.textContent = 'Claim Credits';
            }
        });

        function showNotification(message, isError = false) {
            notification.textContent = message;
            if (isError) {
                notification.classList.add('error');
            } else {
                notification.classList.remove('error');
            }
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
    </script>
